# The Clojure SDK binds the native Rocksky core (librocksky_uniffi) through the
# JVM Panama FFM API (java.lang.foreign), finalized in JDK 22+. Pin a JDK with
# stable FFM plus a matching Clojure so this subtree builds reproducibly,
# independent of whatever the repo root or the host has installed.
[tools]
java = "temurin-25.0.3+9.0.LTS"
clojure = "1.12.5.1654"
