# Fly config for the router itself (not the per-user rockbox machines).
# The router is a single small app that allocates and points at rockbox
# machines via fly-replay.

app          = "rockbox-router"
primary_region = "iad"

[build]

[env]
  FLY_APP                 = "rockbox"
  ROCKBOX_IMAGE           = "registry.fly.io/rockbox:latest"
  FLY_DEFAULT_REGION      = "iad"
  MACHINE_CPU_KIND        = "shared"
  MACHINE_CPUS            = "1"
  MACHINE_MEMORY_MB       = "512"
  MACHINE_INTERNAL_PORT   = "8080"
  PORT                    = "8080"

# Secrets to set:
#   fly secrets set FLY_API_TOKEN=... ROUTER_POSTGRES_URL=... ROUTER_AUTH_BEARER=...

[http_service]
  internal_port       = 8080
  force_https         = true
  auto_stop_machines  = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type       = "requests"
    soft_limit = 200
    hard_limit = 500

[[vm]]
  cpu_kind  = "shared"
  cpus      = 1
  memory_mb = 256
