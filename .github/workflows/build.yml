name: build
on:
  push:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      rockskyd: ${{ steps.filter.outputs.rockskyd }}
      embed: ${{ steps.filter.outputs.embed }}
      feeds: ${{ steps.filter.outputs.feeds }}
      ws: ${{ steps.filter.outputs.ws }}
      mb: ${{ steps.filter.outputs.mb }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'apps/api/**'
              - '.github/workflows/build.yml'
            rockskyd:
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.github/workflows/build.yml'
            embed:
              - 'apps/embed/**'
              - '.github/workflows/build.yml'
            feeds:
              - 'apps/feeds/**'
              - '.github/workflows/build.yml'
            ws:
              - 'apps/ws/**'
              - '.github/workflows/build.yml'
            mb:
              - 'musicbrainz/**'
              - '.github/workflows/build.yml'

  api:
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.15
      - name: Build apps/api
        run: |
          bun install --frozen-lockfile
          bun run build
        working-directory: apps/api
      - name: Upload api dist
        uses: actions/upload-artifact@v4
        with:
          name: api-dist
          path: apps/api/dist
          if-no-files-found: error

  rockskyd:
    needs: changes
    if: needs.changes.outputs.rockskyd == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y \
            libreadline-dev \
            pkg-config \
            flex \
            bison \
            build-essential \
            unzip
      - name: Install DuckDB
        run: |
          DUCKDB_VERSION=1.4.0
          curl -L -o /tmp/duckdb.zip \
            https://github.com/duckdb/duckdb/releases/download/v${DUCKDB_VERSION}/libduckdb-linux-amd64.zip
          sudo mkdir -p /usr/local/lib /usr/local/include
          sudo unzip -o /tmp/duckdb.zip -d /tmp/duckdb
          sudo cp /tmp/duckdb/libduckdb.so /usr/local/lib/
          sudo cp /tmp/duckdb/duckdb.h /tmp/duckdb/duckdb.hpp /usr/local/include/
          sudo ldconfig
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rockskyd-release
          cache-on-failure: true
      - name: cargo build -p rockskyd --release
        run: cargo build -p rockskyd --release
        env:
          DUCKDB_LIB_DIR: /usr/local/lib
          DUCKDB_INCLUDE_DIR: /usr/local/include
      - name: Upload rockskyd binary
        uses: actions/upload-artifact@v4
        with:
          name: rockskyd
          path: target/release/rockskyd
          if-no-files-found: error

  deploy:
    needs: [changes, api, rockskyd]
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      needs.api.result != 'failure' &&
      needs.rockskyd.result != 'failure' &&
      (needs.api.result == 'success' ||
       needs.rockskyd.result == 'success' ||
       needs.changes.outputs.embed == 'true' ||
       needs.changes.outputs.feeds == 'true' ||
       needs.changes.outputs.ws == 'true' ||
       needs.changes.outputs.mb == 'true')
    runs-on: ubuntu-latest
    steps:
      - name: Download api dist
        if: needs.changes.outputs.api == 'true'
        uses: actions/download-artifact@v4
        with:
          name: api-dist
          path: apps/api/dist
      - name: Download rockskyd binary
        if: needs.changes.outputs.rockskyd == 'true'
        uses: actions/download-artifact@v4
        with:
          name: rockskyd
          path: target/release
      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$SSH_PRIVATE_KEY" | base64 -d > ~/.ssh/id_ed25519
          echo "$SSH_PUBLIC_KEY"  | base64 -d > ~/.ssh/id_ed25519.pub
          chmod 600 ~/.ssh/id_ed25519
          chmod 644 ~/.ssh/id_ed25519.pub
          ssh-keyscan -H ssh.rocksky.app >> ~/.ssh/known_hosts
      - name: Pull latest on server
        run: |
          ssh root@ssh.rocksky.app 'cd /root/github/rocksky && git pull origin main && mkdir -p apps/api target/release'
      - name: Deploy apps/api/dist
        if: needs.changes.outputs.api == 'true'
        env:
          API_SERVICES: rocksky rocksky-xrpc
        run: |
          rsync -az --delete -e ssh apps/api/dist/ root@ssh.rocksky.app:/root/github/rocksky/apps/api/dist/
          ssh root@ssh.rocksky.app "set -e; \
            systemctl restart $API_SERVICES; \
            systemctl --no-pager --lines=0 status $API_SERVICES"
      - name: Deploy rockskyd binary
        if: needs.changes.outputs.rockskyd == 'true'
        env:
          ROCKSKYD_SERVICES: rocksky-jetstream rocksky-scrobbler rocksky-spotify rocksky-webscrobbler
        run: |
          chmod +x target/release/rockskyd
          scp target/release/rockskyd root@ssh.rocksky.app:/root/github/rocksky/target/release/rockskyd.new
          ssh root@ssh.rocksky.app "set -e; \
            systemctl stop $ROCKSKYD_SERVICES; \
            mv /root/github/rocksky/target/release/rockskyd.new /root/github/rocksky/target/release/rockskyd; \
            chmod +x /root/github/rocksky/target/release/rockskyd; \
            systemctl start $ROCKSKYD_SERVICES; \
            systemctl --no-pager --lines=0 status $ROCKSKYD_SERVICES"
      - name: Restart rocksky-embed
        if: needs.changes.outputs.embed == 'true'
        run: |
          ssh root@ssh.rocksky.app 'set -e; systemctl restart rocksky-embed; systemctl --no-pager --lines=0 status rocksky-embed'
      - name: Restart rocksky-feeds
        if: needs.changes.outputs.feeds == 'true'
        run: |
          ssh root@ssh.rocksky.app 'set -e; systemctl restart rocksky-feeds; systemctl --no-pager --lines=0 status rocksky-feeds'
      - name: Restart rocksky-ws
        if: needs.changes.outputs.ws == 'true'
        run: |
          ssh root@ssh.rocksky.app 'set -e; systemctl restart rocksky-ws; systemctl --no-pager --lines=0 status rocksky-ws'
      - name: Restart rocksky-mb
        if: needs.changes.outputs.mb == 'true'
        run: |
          ssh root@ssh.rocksky.app 'set -e; systemctl restart rocksky-mb; systemctl --no-pager --lines=0 status rocksky-mb'
