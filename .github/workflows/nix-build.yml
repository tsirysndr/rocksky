name: nix-build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  nix-build:
    name: nix build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Set up Cachix
        uses: cachix/cachix-action@v17
        with:
          name: rocksky
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: nix build (apps/cli)
        run: nix build ./apps/cli --print-build-logs

      - name: List result directory
        run: ls -la result/
