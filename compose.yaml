services:
  nats:
    image: nats:2.11
    ports:
      - "4223:4222"
      - "6223:6222"
      - "8223:8222"

  dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly:latest
    command: --maxmemory=4g
    ports:
      - "6379:6379"
    ulimits:
      memlock:
        soft: -1
        hard: -1

  typesense:
    image: typesense/typesense:28.0
    ports:
      - "8108:8108"
    command: >
      --data-dir /data
      --api-key=xyz
      --enable-cors
    volumes:
      - typesense_data:/data

  db:
    image: postgres:18
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: rocksky
    volumes:
      - pgdata:/var/lib/postgresql/18/docker
    healthcheck:
      test: ['CMD', 'pg_isready']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  typesense_data:
